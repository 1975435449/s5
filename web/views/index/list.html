<style>
    .s5-helper {
        margin: 8px 0 12px;
        padding: 12px 14px;
        border-left: 3px solid #1ab394;
        background: #f7faf9;
        color: #676a6c;
        font-size: 13px;
    }

    .s5-helper-title {
        color: #1c2b36;
        font-weight: 600;
        margin-bottom: 6px;
    }

    .s5-helper-actions {
        margin-top: 10px;
    }

    .s5-helper-actions .btn {
        margin-right: 6px;
    }

    .s5-helper-tip {
        display: inline-block;
        margin: 4px 12px 4px 0;
    }

    .s5-helper code,
    .task-copy-line code {
        color: #1c2b36;
        background: #eef5f2;
        border: 1px solid #d9e9e3;
        white-space: normal;
        word-break: break-all;
    }

    .task-copy-line {
        margin-top: 8px;
    }
</style>

<div class="wrapper wrapper-content animated fadeInRight">

    <div class="row">
        <div class="col-lg-12">
            <div class="ibox float-e-margins">
                <div class="ibox-title">
                    <h5><span id="langtag"></span><span></span></h5>

                    <div class="ibox-tools">
                        <a class="collapse-link">
                            <i class="fa fa-chevron-up"></i>
                        </a>
                        <a class="close-link">
                            <i class="fa fa-times"></i>
                        </a>
                    </div>
                </div>
                <div class="content">
                    <div class="table-responsive">
                        <div id="toolbar">
                            <a href="{{.web_base_url}}/index/add?type={{.type}}&client_id={{.client_id}}" class="btn btn-primary dim">
                            <i class="fa fa-fw fa-lg fa-plus"></i> <span langtag="word-add"></span></a>
                        </div>
                        {{if eq .type "socks5"}}
                        <div class="s5-helper">
                            <div class="s5-helper-title">SOCKS5 操作台</div>
                            <span class="s5-helper-tip"><i class="fa fa-check-circle"></i> 端口留空或填 0 会自动分配</span>
                            <span class="s5-helper-tip"><i class="fa fa-lock"></i> 账号格式：<code>用户名:密码</code>，一行一个</span>
                            <span class="s5-helper-tip"><i class="fa fa-copy"></i> 每行代理支持一键复制</span>
                            <div class="s5-helper-actions">
                                <a href="{{.web_base_url}}/index/add?type=socks5&client_id={{.client_id}}" class="btn btn-primary btn-sm">
                                    <i class="fa fa-plus"></i> 新增 SOCKS5
                                </a>
                                <button class="btn btn-default btn-sm" type="button" onclick="$('#table').bootstrapTable('refresh')">
                                    <i class="fa fa-refresh"></i> 刷新列表
                                </button>
                            </div>
                        </div>
                        {{end}}
                        <table id="taskList_table" class="table-striped table-hover" data-mobile-responsive="true"></table>
                    </div>
                </div>
                <div class="ibox-content">

                    <table id="table"></table>

                </div>
            </div>
        </div>
    </div>
</div>

<script>
    name = '{{.name}}:'.replace(/\s*/g,"")
    $('#langtag').attr('langtag','page-list' + name.replace(/:.*/,"")).next().text(name.split(":")[1])
    var publicHost = '{{.ip}}' || window.location.hostname;

    function htmlEncode(value) {
        return $('<div/>').text(value == null ? '' : String(value)).html();
    }

    function notifyCopySuccess() {
        if (window.toastr) {
            toastr.success('已复制');
        }
    }

    function fallbackCopy(text) {
        var textarea = $('<textarea readonly></textarea>').val(text).css({
            position: 'fixed',
            left: '-9999px',
            top: '0'
        });
        $('body').append(textarea);
        textarea[0].select();
        document.execCommand('copy');
        textarea.remove();
        notifyCopySuccess();
    }

    function copyText(text) {
        if (!text) return;
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(notifyCopySuccess).catch(function () {
                fallbackCopy(text);
            });
            return;
        }
        fallbackCopy(text);
    }

    function firstSocks5Account(row) {
        var rows = String(row.S5User || '').split(/\r?\n/);
        for (var i = 0; i < rows.length; i++) {
            var line = $.trim(rows[i]);
            if (!line) continue;
            var splitAt = line.indexOf(':');
            if (splitAt <= 0 || splitAt === line.length - 1) continue;
            return {
                user: $.trim(line.slice(0, splitAt)),
                pass: $.trim(line.slice(splitAt + 1))
            };
        }
        return null;
    }

    function buildSocks5Endpoint(row) {
        return publicHost + ':' + row.Port;
    }

    function buildSocks5Proxy(row) {
        var account = firstSocks5Account(row);
        var auth = account ? encodeURIComponent(account.user) + ':' + encodeURIComponent(account.pass) + '@' : '';
        return 'socks5://' + auth + buildSocks5Endpoint(row);
    }

    function copySocks5Proxy(index) {
        var row = $('#table').bootstrapTable('getData')[index];
        if (!row) return;
        copyText(buildSocks5Proxy(row));
    }

    function copySocks5Endpoint(index) {
        var row = $('#table').bootstrapTable('getData')[index];
        if (!row) return;
        copyText(buildSocks5Endpoint(row));
    }

    function confirmDeleteTask(index) {
        var row = $('#table').bootstrapTable('getData')[index];
        if (!row) return;
        var label = row.Remark ? ' "' + row.Remark + '"' : ' #' + row.Id;
        if (confirm('确认删除代理' + label + '？删除后端口会停止监听。')) {
            submitform('delete', '{{.web_base_url}}/index/del', {'id': row.Id});
        }
    }

    /*bootstrap table*/
    $('#table').bootstrapTable({
        toolbar: "#toolbar",
        method: 'post', // 服务器数据的请求方式 get or post
        url: "{{.web_base_url}}/index/gettunnel", // 服务器数据的加载地址
        queryParams: function (params) {
            return {
                "offset": params.offset,
                "limit": params.limit,
                "type":"{{.type}}",
                "client_id":"{{.client_id}}",
                "search": params.search,
                "sort": params.sort,
                "order": params.order
            }
        },
        search: true,
        contentType: "application/x-www-form-urlencoded",
        striped: true, // 设置为true会有隔行变色效果
        showHeader: true,
        showColumns: true,
        showRefresh: true,
        pagination: true,//分页
        sidePagination: 'server',//服务器端分页
        pageNumber: 1,
        pageList: [5, 10, 20, 50],//分页步进值
        detailView: true,
        smartDisplay: true, // 智能显示 pagination 和 cardview 等
        onExpandRow: function () {$('body').setLang ('.detail-view');},
        onLoadSuccess:function (data) {$('body').setLang ('.detail-view');},
        onPostBody: function (data) { if ($(this)[0].locale != undefined ) $('body').setLang ('#table'); },
        detailFormatter: function (index, row, element) {
            var flow = row.Flow || {ExportFlow: 0, InletFlow: 0};
            var client = row.Client || {};
            var target = row.Target || {};
            var tmp = '<b langtag="word-exportflow"></b>: ' + changeunit(flow.ExportFlow) + '&emsp;'
                    + '<b langtag="word-inletflow"></b>: ' + changeunit(flow.InletFlow) + '&emsp;'
            if (row.Mode == "socks5") {
                return tmp + '<div class="task-copy-line">'
                        + '<b>代理地址</b>: <code>' + htmlEncode(buildSocks5Endpoint(row)) + '</code> '
                        + '<button class="btn btn-info btn-xs" type="button" onclick="copySocks5Endpoint(' + index + ')"><i class="fa fa-copy"></i></button>'
                        + '</div>'
                        + '<div class="task-copy-line">'
                        + '<b>代理链接</b>: <code>' + htmlEncode(buildSocks5Proxy(row)) + '</code> '
                        + '<button class="btn btn-info btn-xs" type="button" onclick="copySocks5Proxy(' + index + ')"><i class="fa fa-copy"></i></button>'
                        + '</div>'
            }
            if (row.Mode == "p2p") {
                return tmp + "<br/><br>"
                        + '<b langtag="word-commandaccessp2p"></b>: ' + "<code>./npc{{.win}} -server={{.ip}}:{{.p}} -vkey=" + client.VerifyKey
                        + " -type={{.bridgeType}} -password=" + row.Password + " -target=" + target.TargetStr + "</code>" + "<br/><br>"
                        + '<b langtag="word-commandaccessp2ps"></b>: ' + "<code>./npc{{.win}} -server={{.ip}}:{{.p}} -vkey=" + client.VerifyKey
                        + " -type={{.bridgeType}} -password=" + row.Password + " -local_type=p2ps" + "</code>" + "<br/><br>"
                        + '<b langtag="word-commandaccessp2pt"></b>: ' + "<code>./npc{{.win}} -server={{.ip}}:{{.p}} -vkey=" + client.VerifyKey
                        + " -type={{.bridgeType}} -password=" + row.Password + " -local_type=p2pt" + "</code>"

            }
            if (row.Mode == "secret") {
                return tmp + "<br/><br>" + '<b langtag="word-commandaccess"></b>: ' + "<code>./npc{{.win}} -server={{.ip}}:{{.p}} -vkey=" + client.VerifyKey
                        + " -type={{.bridgeType}} -password=" + row.Password + " -local_type=secret" + "</code>"
            }
            return tmp
        },
        //表格的列
        columns: [
            {
                field: 'Id',//域值
                title: '<span langtag="word-id"></span>',//标题
                halign: 'center',
                visible: true,//false表示不显示
                sortable: true,//启用排序
            },
            {
                field: 'ClientId',//域值
                title: '<span langtag="word-clientid"></span>',//标题
                halign: 'center',
                visible: true,//false表示不显示
                sortable: true, //启用排序
                formatter: function (value, row, index) {
                    if (!row.Client) {
                        return '<span class="text-danger">客户端已丢失</span>'
                    }
                    return htmlEncode(row.Client.Id + '-' + row.Client.Remark)
                }
            },
            {
                field: 'Remark',//域值
                title: '<span langtag="word-remark"></span>',//标题
                halign: 'center',
                visible: true//false表示不显示
            },
            {
                field: 'Client.VerifyKey',//域值
                title: '<span langtag="word-verifykey"></span>',//标题
                halign: 'center',
                sortable: true, //启用排序
                visible: true//false表示不显示
            },
            {
                field: 'Port',//域值
                title: '<span langtag="word-port"></span>',//标题
                halign: 'center',
                sortable: true, //启用排序
                visible: true//false表示不显示
            },
            {
                field: 'ExpireTime',//域值
                title: '<span langtag="word-expiretime"></span>',//标题
                align: 'center',
                halign: 'center',
                visible: true,//false表示不显示
                formatter: function (value, row, index) {
                    if(row.PortConfig && row.PortConfig.ExpireTime){
                        return row.PortConfig.ExpireTime
                    }

                }
            },
            {
                field: 'Status',//域值
                title: '<span langtag="word-status"></span>',//内容
                align: 'center',
                halign: 'center',
                visible: true,//false表示不显示
                formatter: function (value, row, index) {
                    if (value) {
                        return '<span class="badge badge-primary" langtag="word-open"></span>'
                    } else {
                        return '<span class="badge badge-badge" langtag="word-close"></span>'
                    }
                }
            },
            {
                field: 'RunStatus',//域值
                title: '<span langtag="word-runstatus"></span>',//内容
                align: 'center',
                halign: 'center',
                visible: true,//false表示不显示
                formatter: function (value, row, index) {
                    if (value) {
                        return '<span class="badge badge-primary" langtag="word-open"></span>'
                    } else {
                        return '<span class="badge badge-badge" langtag="word-close"></span>'
                    }
                }
            },
            {
                field: '',//域值
                title: '<span langtag="word-clientstatus"></span>',//内容
                align: 'center',
                halign: 'center',
                visible: true,//false表示不显示
                formatter: function (value, row, index) {
                    if (row.Client && row.Client.IsConnect) {
                        return '<span class="badge badge-primary" langtag="word-online"></span>'
                    } else {
                        return '<span class="badge badge-badge" langtag="word-offline"></span>'
                    }
                }
            },
            {
                field: 'option',//域值
                title: '<span langtag="word-option"></span>',//内容
                align: 'center',
                halign: 'center',
                visible: true,//false表示不显示
                formatter: function (value, row, index) {
                    btn_group = '<div class="btn-group">'
                    if (row.Mode == "socks5") {
                        btn_group += "<a title=\"复制代理链接\" onclick=\"copySocks5Proxy(" + index
                        btn_group += ")\" class=\"btn btn-outline btn-info\"><i class=\"fa fa-copy\"></i></a>"
                    }
                    if (row.Status) {
                        btn_group += "<a onclick=\"submitform('stop', '{{.web_base_url}}/index/stop', {'id':" + row.Id
                        btn_group += '})" class="btn btn-outline btn-warning"><i class="fa fa-pause"></i></a>'
                    } else {
                        btn_group += "<a onclick=\"submitform('start', '{{.web_base_url}}/index/start', {\'id\':" + row.Id
                        btn_group += '})" class="btn btn-outline btn-primary"><i class="fa fa-play"></i></a>'
                    }
                    btn_group += "<a onclick=\"confirmDeleteTask(" + index
                    btn_group += ')\" class="btn btn-outline btn-danger"><i class="fa fa-trash"></i></a>'
                    btn_group += '<a  href="{{.web_base_url}}/index/edit?id=' + row.Id
                    btn_group += '" class="btn btn-outline btn-success"><i class="fa fa-edit"></i></a></div>'
                    return btn_group
                }
            }
        ]
    });
</script>
