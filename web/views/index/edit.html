<style>
    .s5-account-tools {
        margin-top: 8px;
    }

    .s5-account-tools .btn {
        margin-top: 6px;
        margin-right: 6px;
    }
</style>

<div class="row tile">
    <div class="col-md-12 col-md-auto">
        <div class="ibox float-e-margins">
            <h3 class="ibox-title" langtag="page-edit"></h3>
            <div class="ibox-content">
                <form class="form-horizontal">
                    <input type="hidden" name="id" value="{{.t.Id}}">
                    <div class="form-group hidden">
                        <label class="col-sm-2 control-label font-bold" langtag="word-scheme"></label>
                        <div class="col-sm-10">
                            <span class="help-block m-b-none font-bold" langtag="word-usecase"></span>: 
                            <span id="usecase">
                                <span id="casetcp" langtag="info-casetcp"></span>
                                <span id="caseudp" langtag="info-caseudp"></span>
                                <span id="casehttpProxy" langtag="info-casehttpproxy"></span>
                                <span id="casesocks5" langtag="info-casesocks5"></span>
                                <span id="casesecret" langtag="info-casesecret"></span>
                                <span id="casep2p" langtag="info-casep2p"></span>
                                <span id="casefile" langtag="info-casefile"></span>
                            </span>
                            <select class="form-control" name="type" id="type">
                                <option value="tcp" langtag="scheme-tcp"></option>
                                <option value="udp" langtag="scheme-udp"></option>
                                <option value="httpProxy" langtag="scheme-httpProxy"></option>
                                <option value="socks5" langtag="scheme-socks5"></option>
                                <option value="secret" langtag="scheme-secret"></option>
                                <option value="p2p" langtag="scheme-p2p"></option>
                            {{/*<option value="file" langtag="scheme-file"></option>*/}}
                            </select>
                        </div>
                    </div>

                    <div class="form-group hidden" id="client_id">
                        <label class="col-sm-2 control-label font-bold" langtag="word-clientid"></label>
                        <div class="col-sm-10">
                            <input value="{{if .t.Client}}{{.t.Client.Id}}{{end}}" class="form-control" type="text" name="client_id" placeholder="" langtag="word-clientid">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="col-sm-2 control-label font-bold" langtag="word-remark"></label>
                        <div class="col-sm-10">
                            <input value="{{.t.Remark}}" class="form-control" type="text" name="remark" placeholder="" langtag="info-unrestricted">
                        </div>
                    </div>

                    {{if eq true .isAdmin}}
                    <div class="form-group" id="flow_limit">
                        <label class="control-label font-bold" langtag="word-flowlimit"></label>
                        <div class="col-sm-10">
                            <input class="form-control" type="text"  value="{{.t.PortConfig.FlowLimit}}" name="flow_limit" placeholder="" langtag="info-unrestricted">
                            <span class="help-block m-b-none" langtag="word-unit"></span>: M
                        </div>
                    </div>

                    <div class="form-group" id="max_conn">
                        <label class="control-label font-bold" langtag="word-maxconnections"></label>
                        <div class="col-sm-10">
                            <input class="form-control" type="text" value="{{.t.PortConfig.MaxConn}}" name="max_conn" placeholder="" langtag="info-unrestricted">
                        </div>
                    </div>

                        <div class="form-group" >
                            <label class="col-sm-2 control-label font-bold" langtag="word-expiretime"></label>
                            <div class="col-sm-10">
                                <input type="text" value="{{.t.PortConfig.ExpireTime}}" name="expire_time" class="form-control"  placeholder="留空则表示不受限制" readonly id="expiretime">
                            </div>
                        </div>
                    {{end}}
                    <div class="form-group" id="port">
                        <label class="col-sm-2 control-label font-bold" langtag="word-serverport"></label>
                        <div class="col-sm-10">
                            <input value="{{.t.Port}}" class="form-control" type="text" name="port" placeholder="" langtag="info-suchasport">
                            <span class="help-block m-b-none">Leave empty or 0 to auto allocate.</span>
                        </div>
                    </div>
                    <div class="form-group" id="S5User">
                        <label class="control-label font-bold" langtag="info-suchass5usertitle"></label>
                        <div class="col-sm-10">
                            <textarea class="form-control" name="S5User" rows="4" placeholder=""
                                      langtag="info-suchass5userlist">{{.t.S5User}}</textarea>
                            <span class="help-block m-b-none" langtag="info-suchass5userspan"></span>
                            <div class="s5-account-tools">
                                <div class="row">
                                    <div class="col-sm-4">
                                        <input class="form-control input-sm" id="s5_account_prefix" type="text" value="s5" title="Account prefix">
                                    </div>
                                    <div class="col-sm-2">
                                        <input class="form-control input-sm" id="s5_account_count" type="number" min="1" max="100" value="1" title="Account count">
                                    </div>
                                    <div class="col-sm-6">
                                        <button class="btn btn-info btn-sm" type="button" onclick="generateSocks5Accounts()">
                                            <i class="fa fa-magic"></i> Generate
                                        </button>
                                        <button class="btn btn-default btn-sm" type="button" onclick="clearSocks5Accounts()">
                                            <i class="fa fa-eraser"></i> Clear
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                {{if eq true .allow_local_proxy}}
                    <div class="form-group" id="local_proxy">
                        <label class="control-label col-sm-2 font-bold" langtag="word-proxytolocal"></label>
                        <div class="col-sm-10">
                            <select class="form-control" name="local_proxy">
                                <option  {{if eq false .t.Target.LocalProxy}}selected{{end}} value="0" langtag="word-no"></option>
                                <option  {{if eq true .t.Target.LocalProxy}}selected{{end}} value="1" langtag="word-yes"></option>
                            </select>
                        </div>
                    </div>
                {{end}}
                    <div class="form-group" id="target">
                        <label class="col-sm-2 control-label font-bold" langtag="word-target"></label>
                        <div class="col-sm-10">
                            <textarea class="form-control" name="target" rows="4" placeholder="" langtag="info-suchasiplist">{{.t.Target.TargetStr}}</textarea>
                            <span class="help-block m-b-none" langtag="info-targettunnel"></span>
                        </div>
                    </div>

                    <div class="form-group" id="local_path">
                        <label class="col-sm-2 control-label font-bold" langtag="word-localpath"></label>
                        <div class="col-sm-10">
                            <input value="{{.t.LocalPath}}" class="form-control" type="text" name="local_path" placeholder="" langtag="info-suchaslocalpath">
                        </div>
                    </div>

                    <div class="form-group" id="strip_pre">
                        <label class="col-sm-2 control-label font-bold" langtag="word-stripprefix"></label>
                        <div class="col-sm-10">
                            <input value="{{.t.StripPre}}" class="form-control" type="text" name="strip_pre" placeholder="" langtag="info-suchasstripprefix">
                        </div>
                    </div>

                    <div class="form-group" id="password">
                        <label class="col-sm-2 control-label font-bold" langtag="word-identificationkey"></label>
                        <div class="col-sm-10">
                            <input value="{{.t.Password}}" class="form-control" type="text" name="password" placeholder="" langtag="word-identificationkey">
                            <span class="help-block m-b-none" langtag="info-identificationkey"></span>
                        </div>
                    </div>
                    <div class="hr-line-dashed"></div>
                    <div class="form-group">
                        <div class="col-sm-4 col-sm-offset-2">
                            <button class="btn btn-success" type="button" onclick="submitTunnelForm('edit', '{{.web_base_url}}/index/edit')">
                                <i class="fa fa-fw fa-lg fa-check-circle"></i> <span langtag="word-save"></span>
                                
                            </button>
                        </div>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
<script>
    var arr = []
    arr["all"] = ["port", "target", "password", "local_path", "strip_pre", "local_proxy"]
    arr["tcp"] = ["client_id", "port", "target", "local_proxy"]
    arr["udp"] = ["client_id", "port", "target", "local_proxy"]
    arr["socks5"] = ["port", "client_id", "server_ip","S5User","expire_time","flow_limit","max_conn"]
    arr["httpProxy"] = ["client_id", "port"]
    arr["secret"] = ["client_id", "target", "password"]
    arr["p2p"] = ["client_id", "target", "password"]
    arr["file"] = ["client_id", "port", "local_path", "strip_pre"]

    function resetForm() {
        $(".form-group[id]").css("display", "none");
        $("#usecase span").css("display", "none");
        o = $("#type").val();
        $('#case'+ o).css("display", "inline")
        for (var i = 0; i < arr[o].length; i++) {
            $("#" + arr[o][i]).css("display", "block")
        }
    }

    function showTunnelError(message) {
        if (window.toastr) {
            toastr.error(message);
        } else {
            alert(message);
        }
    }

    function validateNonNegativeInteger(name, label, max) {
        var value = $.trim($("[name='" + name + "']").val() || "");
        if (value === "") return true;
        if (!/^\d+$/.test(value)) {
            showTunnelError(label + " must be a non-negative integer.");
            return false;
        }
        if (max != null && parseInt(value, 10) > max) {
            showTunnelError(label + " is too large.");
            return false;
        }
        return true;
    }

    function validateSocks5Accounts() {
        if ($("#type").val() !== "socks5") return true;
        var rows = String($("[name='S5User']").val() || "").split(/\r?\n/);
        for (var i = 0; i < rows.length; i++) {
            var line = $.trim(rows[i]);
            if (!line) continue;
            var splitAt = line.indexOf(":");
            if (splitAt <= 0 || splitAt === line.length - 1) {
                showTunnelError("SOCKS5 account line " + (i + 1) + " must be username:password.");
                return false;
            }
        }
        return true;
    }

    function validateTunnelForm() {
        return validateNonNegativeInteger("port", "Port", 65535)
            && validateNonNegativeInteger("flow_limit", "Flow limit")
            && validateNonNegativeInteger("max_conn", "Max connections")
            && validateSocks5Accounts();
    }

    function randomToken(length) {
        var chars = "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789";
        var result = "";
        if (window.crypto && window.crypto.getRandomValues) {
            var values = new Uint32Array(length);
            window.crypto.getRandomValues(values);
            for (var i = 0; i < length; i++) {
                result += chars[values[i] % chars.length];
            }
            return result;
        }
        for (var j = 0; j < length; j++) {
            result += chars[Math.floor(Math.random() * chars.length)];
        }
        return result;
    }

    function cleanAccountPrefix(value) {
        value = String(value || "s5").replace(/[^A-Za-z0-9_-]/g, "");
        return value || "s5";
    }

    function generateSocks5Accounts() {
        var prefix = cleanAccountPrefix($("#s5_account_prefix").val());
        var count = parseInt($("#s5_account_count").val(), 10) || 1;
        count = Math.max(1, Math.min(count, 100));
        $("#s5_account_prefix").val(prefix);
        $("#s5_account_count").val(count);

        var rows = [];
        for (var i = 1; i <= count; i++) {
            rows.push(prefix + i + ":" + randomToken(12));
        }
        var target = $("[name='S5User']");
        var current = $.trim(target.val() || "");
        target.val(current ? current + "\n" + rows.join("\n") : rows.join("\n"));
    }

    function clearSocks5Accounts() {
        if (confirm("Clear SOCKS5 accounts?")) {
            $("[name='S5User']").val("");
        }
    }

    function submitTunnelForm(action, url) {
        if (!validateTunnelForm()) return;
        submitform(action, url, $("form").serializeArray());
    }

    $(function () {
        $("#type").val('{{.t.Mode}}');
        resetForm()
        $("#type").on("change", function () {
            resetForm()
        })
        $("#use_client").on("change", function () {
            resetForm()
        })
        /* 第三步:初始化插件  */
        laydate.render({
            elem: '#expiretime' //指定元素
            ,type: 'datetime'
        });
    })
</script>
