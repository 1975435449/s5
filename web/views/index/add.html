<style>
    .s5-account-tools {
        margin-top: 8px;
    }

    .s5-account-tools .btn {
        margin-top: 6px;
        margin-right: 6px;
    }
</style>

<div class="row tile">
    <div class="col-md-12 col-md-auto">
        <div class="ibox float-e-margins">
            <h3 class="ibox-title" langtag="page-add"></h3>
            <div class="ibox-content">
                <form class="form-horizontal">
                    <div class="form-group hidden">
                        <label class="control-label font-bold" langtag="word-scheme"></label>
                        <div class="col-sm-10">
                            <span class="help-block m-b-none font-bold" langtag="word-usecase"></span>:
                            <span id="usecase">
                                <span id="casetcp" langtag="info-casetcp"></span>
                                <span id="caseudp" langtag="info-caseudp"></span>
                                <span id="casehttpProxy" langtag="info-casehttpproxy"></span>
                                <span id="casesocks5" langtag="info-casesocks5"></span>
                                <span id="casesecret" langtag="info-casesecret"></span>
                                <span id="casep2p" langtag="info-casep2p"></span>
                                <span id="casefile" langtag="info-casefile"></span>
                            </span>
                            <select class="form-control" name="type" id="type">
                                <option value="tcp" langtag="scheme-tcp"></option>
                                <option value="udp" langtag="scheme-udp"></option>
                                <option value="httpProxy" langtag="scheme-httpProxy"></option>
                                <option value="socks5" langtag="scheme-socks5"></option>
                                <option value="secret" langtag="scheme-secret"></option>
                                <option value="p2p" langtag="scheme-p2p"></option>
                                {{/*<option value="file" langtag="scheme-file"></option>*/}}
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="control-label font-bold" langtag="word-remark"></label>
                        <div class="col-sm-10">
                            <input class="form-control" type="text" name="remark" placeholder=""
                                   langtag="info-unrestricted">
                        </div>
                    </div>
                    <div class="form-group" id="client_id">
                        <label class="control-label font-bold" langtag="word-clientid"></label>
                        <div class="col-sm-10">
                            <select class="form-control"  name="client_id" placeholder="" langtag="word-belongclient"></select>

<!--                            <input value="{{.client_id}}" class="form-control" type="text" name="client_id"-->
<!--                                   placeholder="" langtag="word-clientid">-->
                        </div>
                    </div>

                    <div class="form-group" id="flow_limit">
                        <label class="control-label font-bold" langtag="word-flowlimit"></label>
                        <div class="col-sm-10">
                            <input class="form-control" type="text" name="flow_limit" placeholder="" langtag="info-unrestricted">
                            <span class="help-block m-b-none" langtag="word-unit"></span>: M
                        </div>
                    </div>

                    <div class="form-group" id="max_conn">
                        <label class="control-label font-bold" langtag="word-maxconnections"></label>
                        <div class="col-sm-10">
                            <input class="form-control" type="text" name="max_conn" placeholder="" langtag="info-unrestricted">
                        </div>
                    </div>

                    <div class="form-group" {{if eq false .isAdmin}} style="display:none" {{end}}>
                        <label class="col-sm-2 control-label font-bold" langtag="word-expiretime"></label>
                        <div class="col-sm-10">
                            <input type="text" name="expire_time" class="form-control"  placeholder="留空则表示不受限制" readonly id="expiretime">
                        </div>
                    </div>
                    <div class="form-group" id="port">
                        <label class="control-label font-bold" langtag="word-serverport"></label>
                        <div class="col-sm-10">
                            <input class="form-control" type="text" name="port" placeholder=""
                                   langtag="info-suchasport">
                            <span class="help-block m-b-none">留空或填 0 会自动分配可用端口。</span>
                        </div>
                    </div>

                    <div class="form-group" id="S5User">
                        <label class="control-label font-bold" langtag="info-suchass5usertitle"></label>
                        <div class="col-sm-10">
                            <textarea class="form-control" name="S5User" rows="4" placeholder=""
                                      langtag="info-suchass5userlist"></textarea>
                            <span class="help-block m-b-none" langtag="info-suchass5userspan"></span>
                            <div class="s5-account-tools">
                                <div class="row">
                                    <div class="col-sm-4">
                                        <input class="form-control input-sm" id="s5_account_prefix" type="text" value="s5" placeholder="账号前缀" title="账号前缀">
                                    </div>
                                    <div class="col-sm-2">
                                        <input class="form-control input-sm" id="s5_account_count" type="number" min="1" max="100" value="1" placeholder="数量" title="生成数量">
                                    </div>
                                    <div class="col-sm-6">
                                        <button class="btn btn-info btn-sm" type="button" onclick="generateSocks5Accounts()">
                                            <i class="fa fa-magic"></i> 生成账号
                                        </button>
                                        <button class="btn btn-default btn-sm" type="button" onclick="clearSocks5Accounts()">
                                            <i class="fa fa-eraser"></i> 清空账号
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {{if eq true .allow_local_proxy}}
                        <div class="form-group" id="local_proxy">
                            <label class="control-label font-bold" langtag="word-proxytolocal"></label>
                            <div class="col-sm-10">
                                <select class="form-control" name="local_proxy">
                                    <option value="0" langtag="word-no"></option>
                                    <option value="1" langtag="word-yes"></option>
                                </select>
                            </div>
                        </div>
                    {{end}}

                    <div class="form-group" id="target">
                        <label class="control-label font-bold" langtag="word-target"></label>
                        <div class="col-sm-10">
                            <textarea class="form-control" name="target" rows="4" placeholder=""
                                      langtag="info-suchasiplist"></textarea>
                            <span class="help-block m-b-none" langtag="info-targettunnel"></span>
                        </div>
                    </div>

                    <div class="form-group" id="local_path">
                        <label class="control-label font-bold" langtag="word-localpath"></label>
                        <div class="col-sm-10">
                            <input class="form-control" type="text" name="local_path" placeholder=""
                                   langtag="info-suchaslocalpath">
                        </div>
                    </div>

                    <div class="form-group" id="strip_pre">
                        <label class="control-label font-bold" langtag="word-stripprefix"></label>
                        <div class="col-sm-10">
                            <input class="form-control" type="text" name="strip_pre" placeholder=""
                                   langtag="info-suchasstripprefix">
                        </div>
                    </div>

                    <div class="form-group" id="password">
                        <label class="control-label font-bold" langtag="word-identificationkey"></label>
                        <div class="col-sm-10">
                            <input class="form-control" type="text" name="password" placeholder=""
                                   langtag="word-identificationkey">
                            <span class="help-block m-b-none" langtag="info-identificationkey"></span>
                        </div>
                    </div>
                    <div class="hr-line-dashed"></div>
                    <div class="form-group">
                        <div class="col-sm-4 col-sm-offset-2">
                            <button class="btn btn-success" type="button"
                                    onclick="submitTunnelForm('add', '{{.web_base_url}}/index/add')">
                                <i class="fa fa-fw fa-lg fa-check-circle"></i> <span langtag="word-add"></span>
                            </button>
                        </div>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
<script>
    var arr = []
    arr["all"] = ["port", "target", "password", "local_path", "strip_pre", "local_proxy", "client_id", "server_ip"]
    arr["tcp"] = ["port", "target", "local_proxy", "client_id", "server_ip"]
    arr["udp"] = ["port", "target", "local_proxy", "client_id", "server_ip"]
    arr["socks5"] = ["port", "client_id", "server_ip","S5User","expire_time","flow_limit","max_conn"]
    arr["httpProxy"] = ["port", "client_id", "server_ip"]
    arr["secret"] = ["target", "password", "client_id", "server_ip"]
    arr["p2p"] = ["target", "password", "client_id", "server_ip"]
    arr["file"] = ["port", "local_path", "strip_pre", "client_id", "server_ip"]

    function resetForm() {
        $(".form-group[id]").css("display", "none");
        $("#usecase span").css("display", "none");
        o = $("#type").val();
        $('#case' + o).css("display", "inline")
        for (var i = 0; i < arr[o].length; i++) {
            $("#" + arr[o][i]).css("display", "block")
        }
    }

    function showTunnelError(message) {
        if (window.toastr) {
            toastr.error(message);
        } else {
            alert(message);
        }
    }

    function validateNonNegativeInteger(name, label, max) {
        var value = $.trim($("[name='" + name + "']").val() || "");
        if (value === "") return true;
        if (!/^\d+$/.test(value)) {
            showTunnelError(label + "必须是非负整数。");
            return false;
        }
        if (max != null && parseInt(value, 10) > max) {
            showTunnelError(label + "超出允许范围。");
            return false;
        }
        return true;
    }

    function validateSocks5Accounts() {
        if ($("#type").val() !== "socks5") return true;
        var rows = String($("[name='S5User']").val() || "").split(/\r?\n/);
        for (var i = 0; i < rows.length; i++) {
            var line = $.trim(rows[i]);
            if (!line) continue;
            var splitAt = line.indexOf(":");
            if (splitAt <= 0 || splitAt === line.length - 1) {
                showTunnelError("SOCKS5 账号第 " + (i + 1) + " 行必须是 用户名:密码。");
                return false;
            }
        }
        return true;
    }

    function validateTunnelForm() {
        return validateNonNegativeInteger("port", "端口", 65535)
            && validateNonNegativeInteger("flow_limit", "流量限制")
            && validateNonNegativeInteger("max_conn", "最大连接数")
            && validateSocks5Accounts();
    }

    function randomToken(length) {
        var chars = "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789";
        var result = "";
        if (window.crypto && window.crypto.getRandomValues) {
            var values = new Uint32Array(length);
            window.crypto.getRandomValues(values);
            for (var i = 0; i < length; i++) {
                result += chars[values[i] % chars.length];
            }
            return result;
        }
        for (var j = 0; j < length; j++) {
            result += chars[Math.floor(Math.random() * chars.length)];
        }
        return result;
    }

    function cleanAccountPrefix(value) {
        value = String(value || "s5").replace(/[^A-Za-z0-9_-]/g, "");
        return value || "s5";
    }

    function generateSocks5Accounts() {
        var prefix = cleanAccountPrefix($("#s5_account_prefix").val());
        var count = parseInt($("#s5_account_count").val(), 10) || 1;
        count = Math.max(1, Math.min(count, 100));
        $("#s5_account_prefix").val(prefix);
        $("#s5_account_count").val(count);

        var rows = [];
        for (var i = 1; i <= count; i++) {
            rows.push(prefix + i + ":" + randomToken(12));
        }
        var target = $("[name='S5User']");
        var current = $.trim(target.val() || "");
        target.val(current ? current + "\n" + rows.join("\n") : rows.join("\n"));
    }

    function clearSocks5Accounts() {
        if (confirm("确认清空 SOCKS5 账号列表？")) {
            $("[name='S5User']").val("");
        }
    }

    function submitTunnelForm(action, url) {
        if (!validateTunnelForm()) return;
        submitform(action, url, $("form").serializeArray());
    }

    $(function () {
        $("#type").val(('{{.type}}' == '') ? 'tcp' : '{{.type}}');
        resetForm()
        $("#type").on("change", function () {
            resetForm()
        })
        $("#use_client").on("change", function () {
            resetForm()
        })

        getClientList()
        /* 第三步:初始化插件  */
        laydate.render({
            elem: '#expiretime' //指定元素
            ,type: 'datetime'
        });
    })

    function getClientList() {
        $("select[name='client_id']").empty();
        $.ajax({
            type: "POST",
            url: "{{.web_base_url}}/client/list", // 服务器数据的加载地址
            data: {order:"asc",offset:0,limit:999},
            dataType : "json",
            success : function(data) {
                if (data && data.rows.length > 0) {
                    for(var i=0; i<data.rows.length; i++){
                        var option="<option value=\""+data.rows[i].Id+"\"";
                        option += ">"+data.rows[i].Id + '-' +data.rows[i].Remark+"</option>"; //动态添加数据
                        $("select[name='client_id']").append(option);
                        $("select[name='client_id']").find("option[value='{{.client_id}}']").attr("selected",true);
                    }
                }
            }
        });
    }
</script>
